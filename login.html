<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | TRUFAGO</title>
  <link rel="stylesheet" href="insex.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <nav>
    <div class="logo">TRUFAGO</div>
    <button class="nav-toggle" aria-label="Open navigation menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="clothes.html">Clothes</a>
      <a href="members.html">Members</a>
      <a href="supporters.html">Supporters</a>
      <a href="social.html">Social</a>
      <a href="cart.html" class="cart-link">Cart <span class="cart-count">0</span></a>
    </div>
  </nav>

  <main class="auth-page">
    <div class="form-card">
      <span class="eyebrow">Account access</span>
      <h2>Login to TRUFAGO</h2>
      <p>Enter your email and password to continue shopping.</p>

      <div id="login-message" class="form-message" style="display:none;"></div>
      <form id="login-form">
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="btn btn-primary">Login</button>
      </form>

      <p style="margin-top: 18px; color: var(--muted);">Don't have an account? <a href="signup.html">Create one</a>.</p>
    </div>
  </main>

  <footer>
    <p>Bodibe Shaleng · GPS: -26.0000, 27.0000 · TRUFAGO Street Wear</p>
    <p><a href="social.html">Social links</a> · <a href="payment.html">Payment</a></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
