<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product | TRUFAGO</title>
  <link rel="stylesheet" href="insex.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <nav>
    <div class="logo">TRUFAGO</div>
    <button class="nav-toggle" aria-label="Open navigation menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="clothes.html">Clothes</a>
      <a href="members.html">Members</a>
      <a href="supporters.html">Supporters</a>
      <a href="social.html">Social</a>
      <a href="cart.html" class="cart-link">Cart <span class="cart-count">0</span></a>
    </div>
  </nav>

  <main class="product-page">
    <div class="section-title">
      <span>Product detail</span>
      <h2 id="product-title">Loading...</h2>
    </div>

    <div class="product-content">
      <figure class="product-preview">
        <img id="product-image" src="hud1.jpg" alt="Product image">
      </figure>

      <div class="product-info">
        <p class="price" id="product-price">R0</p>
        <p id="product-description">Select a product from the shop to see full details.</p>

        <form id="product-form" class="product-form">
          <div class="form-group">
            <label for="product-size">Size</label>
            <select id="product-size" name="size" required>
              <option value="">Select size</option>
            </select>
          </div>

          <div class="form-group">
            <label for="product-quantity">Quantity</label>
            <input type="number" id="product-quantity" name="quantity" min="1" value="1" required>
          </div>

          <button type="submit" class="btn btn-primary">Add to cart</button>
        </form>

        <div id="product-message" class="form-message"></div>
      </div>
    </div>
  </main>

  <footer>
    <p>Bodibe Shaleng · GPS: -26.0000, 27.0000 · TRUFAGO Street Wear</p>
    <p><a href="social.html">Social links</a> · <a href="payment.html">Payment</a></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
